name = "meeting-tracker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "CONVERSATIONS"
class_name = "Conversation"

[[d1_databases]]
binding = "DB"
database_name = "meeting-tracker-db"
database_id = "YOUR_DATABASE_ID_HERE"  # Replace with actual ID from above

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Conversation"]

# Environment variables for Google OAuth
[vars]
GOOGLE_CLIENT_ID = "your-google-client-id.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://meeting-tracker.deleepmenon-s.workers.dev/auth/callback"

[secrets]
# Run: wrangler secret put GOOGLE_CLIENT_SECRET
# GOOGLE_CLIENT_SECRET will be set via command line
